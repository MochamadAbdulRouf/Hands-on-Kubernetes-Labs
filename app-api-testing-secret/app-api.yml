---
# ============================================================
# Secret: APP_API_KEY (base64-encoded)
# Generate value: echo -n "your-secret-key" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-api-secret
  namespace: default
  labels:
    app: app-api
type: Opaque
data:
  # Replace this with: echo -n "your-secret-api-key" | base64
  APP_API_KEY: eW91ci1zZWNyZXQtYXBpLWtleQ==

---
# ============================================================
# ConfigMap: non-sensitive configuration
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-api-configmap
  namespace: default
  labels:
    app: app-api
data:
  APP_PORT: "5000"
  GUNICORN_WORKERS: "2"

---
# ============================================================
# Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-api
  namespace: default
  labels:
    app: app-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: app-api
        version: "1.0.0"
    spec:
      # Security Context: run as non-root at pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # Graceful shutdown window
      terminationGracePeriodSeconds: 30

      containers:
        - name: app-api
          image: mochabdulrouf/app-api:1.0 # <-- Ganti dengan image Anda
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # --- Environment Variables ---
          env:
            # Sensitive: diambil dari Secret
            - name: APP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-api-secret
                  key: APP_API_KEY

            # Non-sensitive: diambil dari ConfigMap
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-api-configmap
                  key: APP_PORT
            - name: GUNICORN_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: app-api-configmap
                  key: GUNICORN_WORKERS

            # Downward API: inject pod metadata untuk /data endpoint
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # --- Probes ---
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # --- Resource Limits ---
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
# ============================================================
# Service: ClusterIP (ganti ke LoadBalancer/NodePort jika perlu)
# ============================================================
# apiVersion: v1
# kind: Service
# metadata:
#   name: k8s-demo-app-svc
#   namespace: default
#   labels:
#     app: k8s-demo-app
# spec:
#   type: ClusterIP
#   selector:
#     app: k8s-demo-app
#   ports:
#     - name: http
#       protocol: TCP
#       port: 80
#       targetPort: http # merujuk ke named port di container (5000)
apiVersion: v1
kind: Service
metadata:
  name: app-api-svc
  namespace: default
  labels:
    app: app-api
spec:
  type: NodePort
  selector:
    app: app-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30010
